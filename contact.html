<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Glowei</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #fff5f8; }
        .form-control:focus { border-color: #f06292; box-shadow: 0 0 0 0.25rem rgba(240, 98, 146, 0.25); }
        .contact-card { background: white; border-top: 5px solid #f06292; border-radius: 15px; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg bg-white shadow-sm mb-5">
    <div class="container">
        <a class="navbar-brand fw-bold" style="color: #e91e63;" href="index.html">Fierce Glow</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                <li class="nav-item"><a class="nav-link active" href="muse.html">Muse</a></li>
                <li class="nav-item"><a class="nav-link active" href="suggestions.html">Suggestions</a></li>
                <li class="nav-item"><a class="nav-link active fw-bold" style="color: #f06292;" href="contact.html">Contact</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="contact-card shadow p-5">
                <h2 class="text-center mb-4" style="color: #ad1457;">Send a Sparkle</h2>
                <p class="text-center text-muted mb-4">Want to collaborate? Have a question? I'd love to hear from you!</p>
                <form>
                    <div class="mb-3">
                        <label class="form-label">Name</label>
                        <input type="text" class="form-control" placeholder="Nami Reyes">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" placeholder="namiereyes@example.com">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Subject</label>
                        <select class="form-select">
                            <option>Product Inquiry</option>
                            <option>Collaboration</option>
                            <option>Other</option>
                        </select>
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Your Message</label>
                        <textarea class="form-control" rows="4"></textarea>
                    </div>
                    <button type="submit" class="btn w-100 py-2" style="background-color: #f06292; color: white;">Send Message</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
